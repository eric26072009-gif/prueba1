<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CookieTech</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;color:#333}
.dark{background:#111;color:white}
header{background:#8b5a2b;color:white;padding:20px;text-align:center}
.card{background:white;margin:20px;padding:20px;border-radius:10px}
.dark .card{background:#222}
.banner{
position:fixed;left:0;width:100%;
padding:15px;text-align:center;color:white;
}
#cookieBanner{bottom:0;background:#222;}
#locationBanner{bottom:60px;background:#0066cc;}
button{margin:5px;padding:8px 12px}
</style>
</head>
<body>

<header>
<h1 id="title">🍪 CookieTech</h1>
<p id="subtitle">Todo sobre las cookies tecnológicas</p>
</header>

<div class="card">
<h2>🌍 Idioma</h2>
<button onclick="setLang('es')">ES</button>
<button onclick="setLang('ca')">CAT</button>
<button onclick="setLang('en')">EN</button>
</div>

<div class="card">
<h2>🌙 Apariencia</h2>
<button onclick="darkMode()">Oscuro</button>
<button onclick="lightMode()">Claro</button>
</div>

<div class="card">
<h2>📍 Ubicación</h2>
<p id="location">Sin permiso</p>
</div>

<div class="card">
<h2>🍪 Cookies</h2>
<p id="cookies"></p>
</div>

<div id="cookieBanner" class="banner">
🍪 Esta web utiliza cookies
<button onclick="acceptCookies()">Aceptar</button>
<button onclick="rejectCookies()">Rechazar</button>
</div>

<div id="locationBanner" class="banner" style="display:none">
📍 Permitir ubicación
<button onclick="acceptLocation()">Permitir</button>
<button onclick="rejectLocation()">Rechazar</button>
</div>

<script>

const txt={
es:["🍪 CookieTech","Todo sobre las cookies tecnológicas"],
ca:["🍪 CookieTech","Tot sobre les cookies tecnològiques"],
en:["🍪 CookieTech","Everything about web cookies"]
};

function setCookie(n,v){
document.cookie=n+"="+v+";max-age=31536000;path=/";
}

function getCookie(n){
let m=document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));
return m?m[2]:null;
}

function deleteCookie(n){
document.cookie=n+"=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/";
}

function refreshCookies(){
document.getElementById("cookies").textContent=document.cookie;
}

function acceptCookies(){
setCookie("consent","yes");
document.getElementById("cookieBanner").style.display="none";
document.getElementById("locationBanner").style.display="block";
refreshCookies();
}

function rejectCookies(){
setCookie("consent","no");
deleteCookie("theme");
deleteCookie("lang");
document.getElementById("cookieBanner").style.display="none";
refreshCookies();
}

function darkMode(){
document.body.classList.add("dark");
if(getCookie("consent")=="yes") setCookie("theme","dark");
}

function lightMode(){
document.body.classList.remove("dark");
if(getCookie("consent")=="yes") setCookie("theme","light");
}

function setLang(l){
document.getElementById("title").textContent=txt[l][0];
document.getElementById("subtitle").textContent=txt[l][1];

if(getCookie("consent")=="yes")
setCookie("lang",l);
}

function acceptLocation(){

setCookie("location","yes");
document.getElementById("locationBanner").style.display="none";

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("location").innerHTML=
"Latitud: "+pos.coords.latitude.toFixed(5)+
"<br>Longitud: "+pos.coords.longitude.toFixed(5);

});

}

function rejectLocation(){
setCookie("location","no");
document.getElementById("locationBanner").style.display="none";
}

window.onload=function(){

if(getCookie("consent")){
document.getElementById("cookieBanner").style.display="none";
}

if(getCookie("theme")=="dark"){
document.body.classList.add("dark");
}

if(getCookie("lang")){
setLang(getCookie("lang"));
}

refreshCookies();

};

</script>

</body>
</html>
