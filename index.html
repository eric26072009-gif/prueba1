<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CookieTech</title>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4;color:#333;transition:.3s}
header{background:#fff;color:#333;text-align:center;padding:30px;transition:.3s}
.dark{background:#121212;color:#fff}
.dark header{background:#000;color:#fff}

.card{
background:#fff;
margin:20px;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.15)
}

.dark .card{background:#222}

button{
padding:10px;
margin:5px;
cursor:pointer;
border:none;
border-radius:8px
}

#cookieBanner{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#222;
color:#fff;
padding:15px;
text-align:center
}

img{
max-width:250px;
border-radius:15px
}

.rainbow .card{
background:linear-gradient(45deg,#ff0000,#ff7300,#ffff00,#00ff00,#00ffff,#0000ff,#8a2be2,#ff00ff);
background-size:400% 400%;
animation:rainbowCard 8s ease infinite;
color:#fff;
box-shadow:0 0 20px #00ffff,0 0 40px #ff00ff,0 0 60px #ffff00;
backdrop-filter:blur(10px)
}

.rainbow h1,.rainbow h2{
animation:glowText 2s infinite alternate
}

.rainbow header{
background:linear-gradient(-45deg,#ff0000,#ff7300,#ffff00,#00ff00,#00ffff,#0000ff,#8a2be2,#ff00ff);
background-size:800% 800%;
animation:rainbowMove 8s linear infinite;
color:#fff
}

@keyframes rainbowCard{
0%{background-position:0% 50%;transform:translateY(0)}
50%{background-position:100% 50%;transform:translateY(-5px)}
100%{background-position:0% 50%;transform:translateY(0)}
}

@keyframes glowText{
from{text-shadow:0 0 10px cyan,0 0 20px cyan}
to{text-shadow:0 0 20px magenta,0 0 40px magenta,0 0 60px yellow}
}

@keyframes rainbowMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
</style>
</head>
<body>

<header>
<h1 id="title">🍪 CookieTech</h1>
<p id="subtitle">Todo sobre las cookies tecnológicas</p>
<img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=500" alt="Cookies">
</header>

<div class="card">
<h2 id="langTitle">🌍 Idioma</h2>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('ca')">🇦🇩 Català</button>
<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('ru')">🇷🇺 Русский</button>
</div>

<div class="card">
<h2 id="themeTitle">🌙 Apariencia</h2>
<button onclick="darkMode()">🌙 Oscuro</button>
<button onclick="lightMode()">☀️ Claro</button>
<button onclick="toggleRainbow()">🌈 Fondo multicolor</button>
</div>

<div class="card">
<h2 id="cookiesTitle">🍪 ¿Qué son las cookies?</h2>
<p id="cookiesText">Las cookies son pequeños archivos que guardan información en tu navegador.</p>
</div>

<div class="card">
<h2 id="currentCookiesTitle">📋 Cookies actuales</h2>
<p id="cookieList"></p>
</div>

<div id="cookieBanner">
🍪 Esta web utiliza cookies.
<button onclick="acceptCookies()">Aceptar</button>
<button onclick="rejectCookies()">Rechazar</button>
</div>

<script>
const txt={
es:{title:"🍪 CookieTech",subtitle:"Todo sobre las cookies tecnológicas",lang:"🌍 Idioma",theme:"🌙 Apariencia",cookies:"🍪 ¿Qué son las cookies?",cookieText:"Las cookies son pequeños archivos que guardan información en tu navegador.",currentCookies:"📋 Cookies actuales",noCookies:"No hay cookies"},
ca:{title:"🍪 CookieTech",subtitle:"Tot sobre les cookies tecnològiques",lang:"🌍 Idioma",theme:"🌙 Aparença",cookies:"🍪 Què són les cookies?",cookieText:"Les cookies són petits fitxers que guarden informació al navegador.",currentCookies:"📋 Cookies actuals",noCookies:"No hi ha cookies"},
en:{title:"🍪 CookieTech",subtitle:"Everything about web cookies",lang:"🌍 Language",theme:"🌙 Appearance",cookies:"🍪 What are cookies?",cookieText:"Cookies are small files that store information in your browser.",currentCookies:"📋 Current cookies",noCookies:"No cookies"},
ru:{title:"🍪 CookieTech",subtitle:"Всё о веб-куки",lang:"🌍 Язык",theme:"🌙 Внешний вид",cookies:"🍪 Что такое cookie?",cookieText:"Cookie — это небольшие файлы, которые сохраняют информацию в браузере.",currentCookies:"📋 Текущие cookie",noCookies:"Нет cookie"}
};

const $=id=>document.getElementById(id);
let currentLang="es";

function setCookie(name,value){
document.cookie=`${name}=${value};max-age=31536000;path=/`;
}

function getCookie(name){
return document.cookie.match(new RegExp(`(^| )${name}=([^;]+)`))?.[2]||null;
}

function deleteCookie(name){
document.cookie=`${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
}

function updateCookies(){
$("cookieList").textContent=document.cookie||txt[currentLang].noCookies;
}

function acceptCookies(){
setCookie("consent","yes");
$("cookieBanner").style.display="none";
updateCookies();
}

function rejectCookies(){
deleteCookie("consent");
deleteCookie("theme");
deleteCookie("lang");
deleteCookie("rainbow");
document.body.classList.remove("dark","rainbow");
$("cookieBanner").style.display="none";
updateCookies();
}

function darkMode(){
document.body.classList.add("dark");
if(getCookie("consent")==="yes") setCookie("theme","dark");
updateCookies();
}

function lightMode(){
document.body.classList.remove("dark");
if(getCookie("consent")==="yes") setCookie("theme","light");
updateCookies();
}

function toggleRainbow(){
document.body.classList.toggle("rainbow");
if(getCookie("consent")==="yes"){
setCookie("rainbow",document.body.classList.contains("rainbow")?"on":"off");}
updateCookies();
}

function setLang(lang){
const t=txt[lang];
currentLang=lang;
$("title").textContent=t.title;
$("subtitle").textContent=t.subtitle;
$("langTitle").textContent=t.lang;
$("themeTitle").textContent=t.theme;
$("cookiesTitle").textContent=t.cookies;
$("cookiesText").textContent=t.cookieText;
$("currentCookiesTitle").textContent=t.currentCookies;
if(getCookie("consent")==="yes") setCookie("lang",lang);
updateCookies();
}

window.addEventListener("load",()=>{
if(getCookie("consent")==="yes"){
$("cookieBanner").style.display="none";}
if(getCookie("theme")==="dark"){
document.body.classList.add("dark");}
if(getCookie("rainbow")==="on"){
document.body.classList.add("rainbow");}
setLang(getCookie("lang") || "es");
updateCookies();
});

const clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClickSound(){
  const osc = clickAudioCtx.createOscillator();
  const gain = clickAudioCtx.createGain();

  osc.type = "triangle";
  osc.frequency.setValueAtTime(900, clickAudioCtx.currentTime);

  gain.gain.setValueAtTime(0.03, clickAudioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    clickAudioCtx.currentTime + 0.05
  );

  osc.connect(gain);
  gain.connect(clickAudioCtx.destination);

  osc.start();
  osc.stop(clickAudioCtx.currentTime + 0.05);
}

document.addEventListener("click",(e)=>{
  if(e.target.tagName==="BUTTON"){
    playClickSound();
  }
});

if(secretWord.includes("cookie")){
alert("🍪 COOKIE MONSTER ACTIVATED!");
const hadRainbow =
document.body.classList.contains("rainbow");
document.body.classList.add("rainbow");
let angle = 0;
const dance = setInterval(function(){
angle += 0.4;
document.body.style.transform =
`rotate(${Math.sin(angle)*3}deg)`;
},50);
setTimeout(function(){
clearInterval(dance);
document.body.style.transform = "none";
if(!hadRainbow){
document.body.classList.remove("rainbow");
}
},3000);
secretWord = "";
});
  
</script>

</body>
</html>
