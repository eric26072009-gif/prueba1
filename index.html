<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookieTech</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
    color:#333;
    transition:.3s;
}

.dark{
    background:#121212;
    color:white;
}

header{
    background:#8b5a2b;
    color:white;
    text-align:center;
    padding:30px;
}

.card{
    background:white;
    max-width:900px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
}

.dark .card{
    background:#222;
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

#banner{
    position:fixed;
    bottom:0;
    width:100%;
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
<h1 id="titulo">🍪 CookieTech</h1>
<p id="subtitulo">Todo sobre las cookies tecnológicas</p>

<img
src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=500"
width="250">
</header>

<div class="card">

<h2 id="idiomaTitulo">Idioma</h2>

<button onclick="cambiarIdioma('es')">🇪🇸 Español</button>
<button onclick="cambiarIdioma('ca')">🇦🇩 Català</button>
<button onclick="cambiarIdioma('en')">🇬🇧 English</button>

</div>

<div class="card">

<h2 id="aparienciaTitulo">Apariencia</h2>

<button onclick="modoOscuro()">🌙 Oscuro</button>
<button onclick="modoClaro()">☀️ Claro</button>

</div>

<div class="card">

<h2 id="cookiesTitulo">¿Qué son las cookies?</h2>

<p id="cookiesTexto">
Las cookies son pequeños archivos que guardan información en tu navegador.
</p>

</div>

<div class="card">

<h2>Cookies actuales</h2>

<p id="estado"></p>

</div>

<div id="banner">

🍪 Esta web utiliza cookies.

<button onclick="aceptarCookies()">
Aceptar
</button>

<button onclick="rechazarCookies()">
Rechazar
</button>

</div>

<script>

const textos = {

es:{
titulo:"🍪 CookieTech",
subtitulo:"Todo sobre las cookies tecnológicas",
idioma:"Idioma",
apariencia:"Apariencia",
cookies:"¿Qué son las cookies?",
texto:"Las cookies son pequeños archivos que guardan información en tu navegador."
},

ca:{
titulo:"🍪 CookieTech",
subtitulo:"Tot sobre les cookies tecnològiques",
idioma:"Idioma",
apariencia:"Aparença",
cookies:"Què són les cookies?",
texto:"Les cookies són petits fitxers que guarden informació al navegador."
},

en:{
titulo:"🍪 CookieTech",
subtitulo:"Everything about web cookies",
idioma:"Language",
apariencia:"Appearance",
cookies:"What are cookies?",
texto:"Cookies are small files that store information in your browser."
}

};

function getCookie(nombre){

const cookies=document.cookie.split(";");

for(let c of cookies){

let [key,value]=c.trim().split("=");

if(key===nombre){
return value;
}

}

return null;
}

function aceptarCookies(){

document.cookie=
"consentimiento=aceptado; max-age=31536000; path=/";

document.getElementById("banner").style.display="none";

actualizarEstado();
}

function rechazarCookies(){

document.cookie=
"consentimiento=rechazado; max-age=31536000; path=/";

document.cookie=
"tema=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";

document.cookie=
"idioma=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";

document.getElementById("banner").style.display="none";

actualizarEstado();
}

function modoOscuro(){

document.body.classList.add("dark");

if(getCookie("consentimiento")==="aceptado"){

document.cookie=
"tema=oscuro; max-age=31536000; path=/";

}

actualizarEstado();
}

function modoClaro(){

document.body.classList.remove("dark");

if(getCookie("consentimiento")==="aceptado"){

document.cookie=
"tema=claro; max-age=31536000; path=/";

}

actualizarEstado();
}

function cambiarIdioma(id){

const t=textos[id];

document.getElementById("titulo").textContent=t.titulo;
document.getElementById("subtitulo").textContent=t.subtitulo;
document.getElementById("idiomaTitulo").textContent=t.idioma;
document.getElementById("aparienciaTitulo").textContent=t.apariencia;
document.getElementById("cookiesTitulo").textContent=t.cookies;
document.getElementById("cookiesTexto").textContent=t.texto;

if(getCookie("consentimiento")==="aceptado"){

document.cookie=
"idioma="+id+"; max-age=31536000; path=/";

}

actualizarEstado();
}

function actualizarEstado(){

document.getElementById("estado").textContent=
document.cookie || "No hay cookies";
}

window.onload=function(){

if(getCookie("consentimiento")){

document.getElementById("banner").style.display="none";
}

if(getCookie("tema")==="oscuro"){
document.body.classList.add("dark");
}

const idiomaGuardado=getCookie("idioma") || "es";

cambiarIdioma(idiomaGuardado);

actualizarEstado();

};

</script>

</body>
</html>
