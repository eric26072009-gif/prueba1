<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookieTech</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    color:#333;
    transition:.3s;
}

.dark{
    background:#121212;
    color:white;
}

.dark .card{
    background:#222;
}

header{
    background:#6b3f1d;
    color:white;
    text-align:center;
    padding:40px;
}

.hero img{
    width:250px;
    border-radius:20px;
}

section{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.cookie-banner{
    position:fixed;
    bottom:0;
    width:100%;
    background:#222;
    color:white;
    padding:15px;
    text-align:center;
}

footer{
    background:#6b3f1d;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>

<h1 id="titulo">🍪 CookieTech</h1>
<p id="subtitulo">Todo sobre las cookies tecnológicas</p>

<div class="hero">
<img
src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e"
alt="Cookies">
</div>

</header>

<section>

<div class="card">
<h2>🌍 Idioma</h2>

<button onclick="cambiarIdioma('es')">🇪🇸 Español</button>
<button onclick="cambiarIdioma('ca')">🇦🇩 Català</button>
<button onclick="cambiarIdioma('en')">🇬🇧 English</button>

</div>

<div class="card">
<h2>🎨 Apariencia</h2>

<button onclick="activarOscuro()">
🌙 Modo oscuro
</button>

<button onclick="activarClaro()">
☀️ Modo claro
</button>

</div>

<div class="card">
<h2>🍪 ¿Qué son las cookies?</h2>

<p>
Las cookies son pequeños archivos que los sitios web guardan
en tu navegador para recordar información.
</p>

</div>

<div class="card">

<h2>📋 Cookies guardadas</h2>

<p id="estado"></p>

</div>

</section>

<div id="banner" class="cookie-banner">

🍪 Esta web utiliza cookies.

<button onclick="aceptarCookies()">
Aceptar
</button>

<button onclick="rechazarCookies()">
Rechazar
</button>

</div>

<footer>
CookieTech © 2026
</footer>

<script>

const idiomas = {

es:{
titulo:"🍪 CookieTech",
subtitulo:"Todo sobre las cookies tecnológicas"
},

ca:{
titulo:"🍪 CookieTech",
subtitulo:"Tot sobre les cookies tecnològiques"
},

en:{
titulo:"🍪 CookieTech",
subtitulo:"Everything about web cookies"
}

};

function aceptarCookies(){

document.cookie =
"consentimiento=aceptado; max-age=31536000; path=/";

document.getElementById("banner").style.display="none";

mostrarEstado();
}

function rechazarCookies(){

document.cookie =
"consentimiento=rechazado; max-age=31536000; path=/";

document.getElementById("banner").style.display="none";

mostrarEstado();
}

function activarOscuro(){

document.body.classList.add("dark");

document.cookie =
"tema=oscuro; max-age=31536000; path=/";

mostrarEstado();
}

function activarClaro(){

document.body.classList.remove("dark");

document.cookie =
"tema=claro; max-age=31536000; path=/";

mostrarEstado();
}

function cambiarIdioma(idioma){

document.cookie =
"idioma="+idioma+"; max-age=31536000; path=/";

document.getElementById("titulo").textContent =
idiomas[idioma].titulo;

document.getElementById("subtitulo").textContent =
idiomas[idioma].subtitulo;

mostrarEstado();
}

function mostrarEstado(){

document.getElementById("estado").textContent =
document.cookie || "No hay cookies";
}

window.onload = function(){

if(document.cookie.includes("consentimiento=")){
document.getElementById("banner").style.display="none";
}

if(document.cookie.includes("tema=oscuro")){
document.body.classList.add("dark");
}

if(document.cookie.includes("idioma=ca")){
cambiarIdioma("ca");
}
else if(document.cookie.includes("idioma=en")){
cambiarIdioma("en");
}
else{
cambiarIdioma("es");
}

mostrarEstado();
};

</script>

</body>
</html>
